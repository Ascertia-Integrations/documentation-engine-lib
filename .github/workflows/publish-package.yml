name: Publish Package

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/docusaurus-version-sync/package.json'
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ascertia-integrations'

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build --workspace=packages/docusaurus-version-sync

      - name: Publish to GitHub Packages
        run: |
          cd packages/docusaurus-version-sync
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
