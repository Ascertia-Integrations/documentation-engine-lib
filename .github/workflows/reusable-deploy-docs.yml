name: reusable-deploy-docs

on:
  workflow_call:
    secrets:
      DOCS_PLATFORM_NPM_TOKEN:
        description: NPM token (PAT) with access to install @ascertia-integrations packages from GitHub Packages.
        required: true
    inputs:
      default_branch:
        description: Default branch used for building and committing generated artifacts.
        required: false
        type: string
        default: main
      release_branch_glob:
        description: Branch glob that represents X.Y.Z release branches (caller should trigger on this).
        required: false
        type: string
        default: "*.*.*"
      node_version:
        description: Node.js version for build steps.
        required: false
        type: string
        default: "20"
      docs_dir:
        description: Docs directory (passed to sync tool if used).
        required: false
        type: string
        default: docs
      sync_command:
        description: Command to sync or prune release versions in Docusaurus artifacts.
        required: false
        type: string
        default: npx --yes @ascertia-integrations/docusaurus-version-sync@latest
      release_action:
        description: How to handle versioned artifacts. auto=build main or sync release pushes, prune=remove a deleted release version.
        required: false
        type: string
        default: auto
      release_ref:
        description: Release branch/version to sync or prune. Defaults to the triggering ref name when omitted.
        required: false
        type: string
        default: ""
      build_command:
        description: Build command for the Docusaurus site.
        required: false
        type: string
        default: npm run build
      install_command:
        description: Dependency install command for the Docusaurus site.
        required: false
        type: string
        default: npm ci
      pages_mode:
        description: GitHub Pages mode for computing SITE_URL and BASE_URL.
        required: false
        type: string
        default: project

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve pipeline mode
        id: release_mode
        shell: bash
        run: |
          release_ref="${{ inputs.release_ref }}"
          if [ -z "$release_ref" ]; then
            release_ref="${{ github.ref_name }}"
          fi
          if [ -z "$release_ref" ]; then
            release_ref="${{ inputs.default_branch }}"
          fi

          requested_action="${{ inputs.release_action }}"
          case "$requested_action" in
            auto)
              if [ "$release_ref" = "${{ inputs.default_branch }}" ]; then
                effective_action="build"
              else
                effective_action="sync"
              fi
              ;;
            build|sync|prune)
              effective_action="$requested_action"
              ;;
            *)
              echo "::error::Unsupported release_action '$requested_action'."
              exit 1
              ;;
          esac

          if [[ "$release_ref" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_release_ref=true
          else
            is_release_ref=false
          fi

          should_run=true
          if [ "$effective_action" = "sync" ] && [ "$is_release_ref" != "true" ]; then
            echo "::error::release_action=sync requires an X.Y.Z release_ref, got '$release_ref'."
            exit 1
          fi
          if [ "$effective_action" = "prune" ] && [ "$is_release_ref" != "true" ]; then
            echo "Deleted ref '$release_ref' is not an X.Y.Z release branch; skipping prune."
            should_run=false
          fi

          echo "release_ref=$release_ref" >> "$GITHUB_OUTPUT"
          echo "effective_action=$effective_action" >> "$GITHUB_OUTPUT"
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Checkout default branch
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Configure npm (GitHub Packages)
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        run: |
          if [ -z "${{ secrets.DOCS_PLATFORM_NPM_TOKEN }}" ]; then
            echo "::error::DOCS_PLATFORM_NPM_TOKEN secret is missing or empty."
            exit 1
          fi
          npm config set @ascertia-integrations:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken "${{ secrets.DOCS_PLATFORM_NPM_TOKEN }}"

      - name: Install dependencies
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        run: ${{ inputs.install_command }}

      - name: Update Ascertia integrations packages
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        run: npm install @ascertia-integrations/docusaurus-preset-docs@latest

      - name: Fetch triggering branch (if release)
        if: ${{ steps.release_mode.outputs.effective_action == 'sync' }}
        run: git fetch --no-tags origin "${{ steps.release_mode.outputs.release_ref }}"

      - name: Sync versioned docs from release branch
        if: ${{ steps.release_mode.outputs.effective_action == 'sync' }}
        run: ${{ inputs.sync_command }} "${{ steps.release_mode.outputs.release_ref }}" --allow-dirty --docs-dir "${{ inputs.docs_dir }}"

      - name: Prune deleted release version
        if: ${{ steps.release_mode.outputs.effective_action == 'prune' }}
        run: ${{ inputs.sync_command }} "${{ steps.release_mode.outputs.release_ref }}" --allow-dirty --docs-dir "${{ inputs.docs_dir }}" --remove

      - name: Commit synced artifacts to default branch
        if: ${{ steps.release_mode.outputs.effective_action == 'sync' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Generated version artifacts are commonly gitignored in consumer repos,
          # but they still need to be committed back to the default branch.
          git add -A -f -- versions.json versioned_docs versioned_sidebars || true
          if git diff --cached --quiet; then
            echo "No version artifacts changed; skipping commit."
            exit 0
          fi
          git commit -m "chore(docs): sync version ${{ steps.release_mode.outputs.release_ref }}"
          git push origin "HEAD:${{ inputs.default_branch }}"

      - name: Commit pruned artifacts to default branch
        if: ${{ steps.release_mode.outputs.effective_action == 'prune' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -f -- versions.json versioned_docs versioned_sidebars || true
          if git diff --cached --quiet; then
            echo "No version artifacts changed; skipping commit."
            exit 0
          fi
          git commit -m "chore(docs): remove version ${{ steps.release_mode.outputs.release_ref }}"
          git push origin "HEAD:${{ inputs.default_branch }}"

      - name: Compute Pages env
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        run: |
          if [ "${{ inputs.pages_mode }}" = "org" ]; then
            echo "SITE_URL=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
            echo "BASE_URL=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
            echo "BASE_URL=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build site
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_URL: ${{ env.BASE_URL }}
        run: ${{ inputs.build_command }}

      - name: Upload Pages artifact
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        if: ${{ steps.release_mode.outputs.should_run == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
